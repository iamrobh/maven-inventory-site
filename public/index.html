<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maven Inventory</title>
  <style>
    :root { --teal: #14B8A6; --slate-900: #0f172a; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--slate-900);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { max-width: 500px; padding: 2rem; }
    h1 { color: var(--teal); font-size: 2.5rem; margin-bottom: 1rem; letter-spacing: -0.03em; }
    p { font-size: 1.15rem; line-height: 1.6; margin-bottom: 2rem; color: #94a3b8; }
    a {
      display: inline-block;
      background: var(--teal);
      color: var(--slate-900);
      padding: 0.75rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.9; }
    .links { margin-top: 2rem; }
    .links a {
      background: transparent;
      color: #64748b;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
    }
    .links a:hover { color: var(--teal); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Maven Inventory</h1>
    <p>Multi-location inventory management and demand forecasting for e-commerce.</p>
    <a href="https://maveninventory.com/inventory">Open Dashboard</a>
    <div class="links">
      <a href="/privacy">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
